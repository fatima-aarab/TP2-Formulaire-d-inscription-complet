<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulaire d'inscription">
    <title>Formulaire d'inscription</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Formulaire d'inscription</h1>
        
        <form action="#" method="POST" enctype="multipart/form-data">
            <fieldset>
                <legend>Informations personnelles</legend>
                
                <div class="form-group">
                    <label for="nom">Nom *</label>
                    <input type="text" id="nom" name="nom" required 
                           autocomplete="family-name">
                </div>
                
                <div class="form-group">
                    <label for="prenom">Prénom *</label>
                    <input type="text" id="prenom" name="prenom" required 
                           autocomplete="given-name">
                </div>
                
                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required 
                           autocomplete="email"
                           placeholder="exemple@email.com">
                </div>
                
                <div class="form-group">
                    <label for="telephone">Téléphone *</label>
                    <input type="tel" id="telephone" name="telephone" required
                           pattern="^[0-9]{2}[-\s][0-9]{2}[-\s][0-9]{2}[-\s][0-9]{2}[-\s][0-9]{2}$"
                           placeholder="01 23 45 67 89"
                           autocomplete="tel">
                    <small>Format: 01 23 45 67 89</small>
                </div>
                
                <div class="form-group">
                    <label for="naissance">Date de naissance *</label>
                    <input type="date" id="naissance" name="naissance" required>
                </div>
            </fieldset>
            
            <fieldset>
                <legend>Sécurité</legend>
                
                <div class="form-group">
                    <label for="password">Mot de passe *</label>
                    <input type="password" id="password" name="password" required
                           pattern="^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$"
                           autocomplete="new-password">
                    <small>Min 8 caractères, 1 majuscule, 1 chiffre</small>
                </div>
                
                <div class="form-group">
                    <label for="confirm-password">Confirmation mot de passe *</label>
                    <input type="password" id="confirm-password" name="confirm-password" required
                           autocomplete="new-password">
                </div>
            </fieldset>
            
            <fieldset>
                <legend>Préférences</legend>
                
                <div class="form-group">
                    <label for="pays">Pays *</label>
                    <select id="pays" name="pays" required>
                        <option value="">Sélectionnez un pays</option>
                        <option value="fr">France</option>
                        <option value="be">Belgique</option>
                        <option value="ch">Suisse</option>
                        <option value="ca">Canada</option>
                        <option value="autre">Autre</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Genre *</label>
                    <div class="radio-group">
                        <label>
                            <input type="radio" name="genre" value="homme" required>
                            Homme
                        </label>
                        <label>
                            <input type="radio" name="genre" value="femme" required>
                            Femme
                        </label>
                        <label>
                            <input type="radio" name="genre" value="autre" required>
                            Autre
                        </label>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Centres d'intérêt</label>
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" name="interets" value="sport">
                            Sport
                        </label>
                        <label>
                            <input type="checkbox" name="interets" value="musique">
                            Musique
                        </label>
                        <label>
                            <input type="checkbox" name="interets" value="lecture">
                            Lecture
                        </label>
                        <label>
                            <input type="checkbox" name="interets" value="voyage">
                            Voyage
                        </label>
                        <label>
                            <input type="checkbox" name="interets" value="technologie">
                            Technologie
                        </label>
                    </div>
                </div>
            </fieldset>
            
            <fieldset>
                <legend>Plus d'informations</legend>
                
                <div class="form-group">
                    <label for="bio">Biographie</label>
                    <textarea id="bio" name="bio" rows="5" maxlength="500"
                              placeholder="Parlez-nous de vous (500 caractères max)"></textarea>
                    <small id="char-count">0/500 caractères</small>
                </div>
                
                <div class="form-group">
                    <label for="photo">Photo de profil</label>
                    <input type="file" id="photo" name="photo" 
                           accept="image/png, image/jpeg, image/jpg">
                    <small>Formats acceptés: JPG, PNG (max 2Mo)</small>
                </div>
            </fieldset>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="cgu" required>
                    J'accepte les Conditions Générales d'Utilisation *
                </label>
            </div>
            
            <button type="submit" class="btn-submit">S'inscrire</button>
            <button type="reset" class="btn-reset">Réinitialiser</button>
        </form>
    </div>
    
    <script>
        // Compteur de caractères pour la bio
        document.getElementById('bio').addEventListener('input', function() {
            document.getElementById('char-count').textContent = 
                this.value.length + '/500 caractères';
        });
        
        // Validation de la confirmation de mot de passe
        document.querySelector('form').addEventListener('submit', function(e) {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (password !== confirmPassword) {
                e.preventDefault();
                alert('Les mots de passe ne correspondent pas!');
            }
            
            // Validation de l'âge (18 ans minimum)
            const naissance = new Date(document.getElementById('naissance').value);
            const today = new Date();
            let age = today.getFullYear() - naissance.getFullYear();
            const monthDiff = today.getMonth() - naissance.getMonth();
            
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < naissance.getDate())) {
                age--;
            }
            
            if (age < 18) {
                e.preventDefault();
                alert('Vous devez avoir au moins 18 ans pour vous inscrire.');
            }
        });
    </script>
</body>
</html>
